name: bonio_desktop
description: Bonio Desktop - AI Agent Gateway Client
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  web_socket_channel: ^3.0.1
  cryptography: ^2.7.0
  shared_preferences: ^2.3.4
  provider: ^6.1.2
  flutter_markdown: ^0.7.4+3
  path_provider: ^2.1.5
  uuid: ^4.5.1
  json_annotation: ^4.9.0
  url_launcher: ^6.3.1
  collection: ^1.18.0
  camera: ^0.11.0+2
  camera_desktop: ^1.0.6
  desktop_multi_window:
    path: packages/desktop_multi_window
  window_manager: ^0.5.1
  lottie: ^3.1.3
  system_tray: ^0.1.1
  sherpa_onnx: ^1.12.35
  ffi: ^2.1.0
  archive: ^4.0.9
  file_picker: ^11.0.2
  webview_windows: ^0.4.0
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/themes/default-cat/
    - assets/reading/
    - assets/app_icon.ico
